          <svg id="connectSpinner" class="hidden animate-spin h-5 w-5" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
        </button>
        <div id="connectSuccess" class="hidden text-center py-8">
          <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6" style="background:rgba(139,92,246,.1)"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
          <p class="text-2xl font-bold">¡Gracias por sumarte!</p>
          <p class="text-gray-500 mt-2">Te contactaremos con toda la información del programa TDP Connect.</p>
        </div>
      </form>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="py-16" style="border-top:1px solid rgba(255,255,255,.05)">
  <div class="max-w-7xl mx-auto px-6">
    <div class="flex flex-col md:flex-row items-center justify-between gap-6">
      <img src="/ISOTIPOTDP.png" alt="Taller de Pixeles" class="h-6 w-auto brightness-0 invert opacity-40">
      <div class="text-sm text-gray-600">© 2026 Taller de Pixeles C.A. — TDP Connect</div>
    </div>
  </div>
</footer>

<script>
// Intersection Observer
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add('visible');
  });
}, { threshold: 0.1 });
document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

// Fade out effect on question section
const questionSection = document.getElementById('question');
const questionText = document.getElementById('questionText');
if (questionSection && questionText) {
  const qObserver = new IntersectionObserver(([entry]) => {
    const ratio = entry.intersectionRatio;
    questionText.style.opacity = Math.max(0, ratio * 2 - 0.5);
    questionText.style.transform = `translateY(${(1 - ratio) * 100}px)`;
  }, { threshold: Array.from({length: 20}, (_, i) => i / 20) });
  qObserver.observe(questionSection);
}

// Form submission
document.getElementById('connectForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('connectBtn');
  const txt = document.getElementById('connectBtnText');
  const spin = document.getElementById('connectSpinner');
  const success = document.getElementById('connectSuccess');
  btn.disabled = true; txt.textContent = 'Enviando...'; spin.classList.remove('hidden');
  try {
    const r = await fetch('/api/p/lead', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        name: document.getElementById('leadName').value,
        email: document.getElementById('leadEmail').value,
        phone: document.getElementById('leadPhone').value,
        company: document.getElementById('leadCompany').value,
        service: 'TDP Connect Partner',
        message: 'Profesión: ' + (document.getElementById('leadProfession').value || '') + '. ' + (document.getElementById('leadMessage').value || '')
      })
    });
    const j = await r.json();
    if (j.ok) {
      this.querySelectorAll('input,textarea').forEach(el => el.value = '');
      this.querySelector('.space-y-4')?.classList.add('hidden');
      success.classList.remove('hidden');
    } else { alert('Error: ' + j.error); }
  } catch(e) { alert('Error de conexión'); }
  finally { btn.disabled = false; txt.textContent = 'Quiero ser Partner'; spin.classList.add('hidden'); }
});
</script>
</body>
</html>
